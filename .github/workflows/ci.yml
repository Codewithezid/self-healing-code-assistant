name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall src scripts main.py web_main.py

      - name: Run offline audit
        env:
          CODE_ASSISTANT_RAG_ENABLED: 'false'
          CODE_ASSISTANT_CORRECTIVE_RAG_ENABLED: 'false'
        run: python scripts/audit_project.py
